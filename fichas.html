<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DGCIDCIENCIA - Fichas Técnicas</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  
  <style>
    .active-tab { border-bottom: 3px solid #4f46e5; color: #4f46e5; font-weight: 700; }
    .diplomatic-shadow { box-shadow: 0 8px 24px rgba(22,40,57,0.06); }
    .bg-surface { background-color: #f8f9fa; }
    .bg-surface-container-low { background-color: #edeeef; }
    .bg-surface-container-high { background-color: #e7e8e9; }
    .bg-surface-container-lowest { background-color: #ffffff; }
    .text-primary { color: #162839; }
    .text-secondary { color: #4646d8; }
    .text-outline { color: #74777d; }
    .text-on-surface-variant { color: #43474c; }
    .border-secondary\/10 { border-color: rgba(70,70,216,0.1); }
    .bg-secondary-fixed { background-color: #e1e0ff; }
    .bg-tertiary-fixed { background-color: #6dfad2; }
    .rotate-180 { transform: rotate(180deg); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .glass-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

  <!-- HEADER (igual que portal.html) -->
  <header class="bg-white border-b sticky top-0 z-40 px-4 py-3 flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white">
        <i class="fas fa-globe-americas text-xl"></i>
      </div>
      <div>
        <h1 class="text-lg font-bold leading-tight">DGCIDCIENCIA</h1>
        <p class="text-[10px] text-slate-500 uppercase tracking-widest">DG de Proyectos de Cooperación Internacional</p>
      </div>
    </div>
    <button id="btnMenu" class="p-2 hover:bg-slate-100 rounded-full transition-all text-indigo-600 focus:ring-2 focus:ring-indigo-500">
      <span class="material-symbols-outlined">menu</span>
    </button>
  </header>

  <!-- MENÚ DESPLEGABLE -->
  <div id="menuPanel" class="hidden fixed top-[60px] right-4 bg-white rounded-xl shadow-xl border border-gray-200 z-[9999] w-56">
    <div class="flex flex-col">
      <button id="menuProyectosEntregados" class="w-full text-left px-4 py-3 text-sm text-gray-700 hover:bg-gray-100 transition-colors flex items-center gap-3 rounded-t-xl">
        <span class="material-symbols-outlined text-indigo-500 text-base">check_circle</span>
        <span>Proyectos entregados</span>
      </button>
      <button id="menuFichasTecnicas" class="w-full text-left px-4 py-3 text-sm text-gray-700 hover:bg-gray-100 transition-colors flex items-center gap-3 rounded-b-xl">
        <span class="material-symbols-outlined text-indigo-500 text-base">description</span>
        <span>Fichas Técnicas</span>
      </button>
    </div>
  </div>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="pt-6 pb-32 px-4 max-w-7xl mx-auto">
    <div class="mb-6">
      <h2 class="text-3xl font-bold text-primary">Catálogo de Fichas</h2>
      <p class="text-on-surface-variant text-base mt-2">Accede a las tarjetas informativas de Cooperación de cada país.</p>
    </div>

    <!-- Grid de tarjetas -->
    <div id="fichasGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Las tarjetas se generarán dinámicamente desde JavaScript -->
    </div>
  </main>

  <!-- FOOTER (solo INICIO) -->
  <nav class="fixed bottom-0 w-full bg-white border-t flex justify-center items-center py-3 z-50 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
    <button id="btnInicio" class="flex flex-col items-center gap-1 transition-colors px-6 text-indigo-600 hover:text-indigo-800">
      <i class="fas fa-home text-lg"></i>
      <span class="text-[10px] font-medium uppercase tracking-tighter">Inicio</span>
    </button>
  </nav>

  <script>
    // ============================================================
    // CONFIGURACIÓN DE FICHAS (Word y PDF)
        //archivoUrl: "https://raw.githubusercontent.com/tu-usuario/tu-repositorio/main/fichas/tailandia.docx",
        //tipoArchivo: "docx"
        //archivoUrl: "https://raw.githubusercontent.com/tu-usuario/tu-repositorio/main/fichas/japon.pdf",
        //tipoArchivo: "pdf"
    // ============================================================
    const paisesFichas = [
      {
        nombre: "Reino de Tailandia",
        imagen: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Flag_of_Thailand.svg/2560px-Flag_of_Thailand.svg.png",
        descripcion: "Tarjeta informativa de Cooperación con el Reino de Tailandia",
        tags: ["Tarjeta informativa", "junio 2026"],
        archivoUrl: "https://raw.githubusercontent.com/DanonninoPlus/DGCIDCIENCIA/main/ti/Cooperacion_con_el_Reino_de_Tailandia.docx",
        tipoArchivo: "docx"
      },
      {
        nombre: "Singapur",
        imagen: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Flag_of_Japan.svg/2560px-Flag_of_Japan.svg.png",
        descripcion: "Tarjeta informativa de Cooperación con Singapur",
        tags: ["Tarjeta informativa", "junio 2026"],
        archivoUrl: "https://raw.githubusercontent.com/DanonninoPlus/DGCIDCIENCIA/main/ti/TA_Singapur_CID.docx",
        tipoArchivo: "docx"
      },
      {
        nombre: "China",
        imagen: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Flag_of_the_People%27s_Republic_of_China.svg/2560px-Flag_of_the_People%27s_Republic_of_China.svg.png",
        descripcion: "Tarjeta informativa de Cooperación con China",
        tags: ["Tarjeta informativa", "junio 2026"],
        archivoUrl: "https://raw.githubusercontent.com/DanonninoPlus/DGCIDCIENCIA/main/ti/Tarjeta_informativa_China.docx",
        tipoArchivo: "docx"
      },
      {
        nombre: "Indonesia",
        imagen: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/09/Flag_of_South_Korea.svg/2560px-Flag_of_South_Korea.svg.png",
        descripcion: "Tarjeta informativa de Cooperación con Indonesia",
        tags: ["Tarjeta informativa", "junio 2026"],
        archivoUrl: "https://raw.githubusercontent.com/DanonninoPlus/DGCIDCIENCIA/main/ti/Tarjeta_Informativa_Indonesia.docx",
        tipoArchivo: "docx"
      },
      {
        nombre: "India",
        imagen: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/48/Flag_of_Singapore.svg/2560px-Flag_of_Singapore.svg.png",
        descripcion: "Tarjeta informativa de Cooperación con India",
        tags: ["Tarjeta informativa", "junio 2026", "Nuevo"],
        archivoUrl: "https://raw.githubusercontent.com/DanonninoPlus/DGCIDCIENCIA/main/ti/Tarjeta_Informativa_Cooperación_con_India.docx",
        tipoArchivo: "pdf"
      },
      {
        nombre: "Malasia",
        imagen: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/fc/Flag_of_Mexico.svg/2560px-Flag_of_Mexico.svg.png",
        descripcion: "Tarjeta informativa de Cooperación con Malasia",
        tags: ["Tarjeta informativa", "junio 2026"],
        archivoUrl: "https://raw.githubusercontent.com/DanonninoPlus/DGCIDCIENCIA/main/ti/Tarjeta_informativa_Cooperacion_con_Malasia.docx",
        tipoArchivo: "docx"
      },
      {
        nombre: "Vietnam",
        imagen: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/fc/Flag_of_Mexico.svg/2560px-Flag_of_Mexico.svg.png",
        descripcion: "Tarjeta informativa de Cooperación con Vietnam",
        tags: ["Tarjeta informativa", "junio 2026"],
        archivoUrl: "https://raw.githubusercontent.com/DanonninoPlus/DGCIDCIENCIA/main/ti/Tarjeta_informativa_Cooperacion_con_Vietnam.docx",
        tipoArchivo: "docx"
      },
      {
        nombre: "Japón",
        imagen: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/fc/Flag_of_Mexico.svg/2560px-Flag_of_Mexico.svg.png",
        descripcion: "Tarjeta informativa de Cooperación con Japón",
        tags: ["Tarjeta informativa", "junio 2026"],
        archivoUrl: "https://raw.githubusercontent.com/DanonninoPlus/DGCIDCIENCIA/main/ti/TA_CID_entre_MX-JP_abr2026.docx",
        tipoArchivo: "docx"
      },
      {
        nombre: "MIKTA",
        imagen: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/fc/Flag_of_Mexico.svg/2560px-Flag_of_Mexico.svg.png",
        descripcion: "Avances en materia de Cooperación Internacional para el Desarrollo",
        tags: ["Tarjeta informativa", "junio 2026"],
        archivoUrl: "https://raw.githubusercontent.com/DanonninoPlus/DGCIDCIENCIA/main/ti/TI_MIKTA_Avances_en_materia_de_CID.docx",
        tipoArchivo: "docx"
      },
      {
        nombre: "MIKTA",
        imagen: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/fc/Flag_of_Mexico.svg/2560px-Flag_of_Mexico.svg.png",
        descripcion: "Proyecto de Rehabilitación de la Escuela Primaria: RENÉ JUÁREZ CISNEROS, Acapulco, Guerrero",
        tags: ["Tarjeta informativa", "junio 2026"],
        archivoUrl: "https://raw.githubusercontent.com/DanonninoPlus/DGCIDCIENCIA/main/ti/TI_MIKTA_Proyecto_Escuela_Rene_Juarez_Cisneros.docx",
        tipoArchivo: "docx"
      }
    ];

    // ============================================================
    // FUNCIÓN DE DESCARGA (soporta Word y PDF)
    // ============================================================
    function descargarArchivo(url, nombre, tipo) {
      const btn = document.querySelector(`.btn-descargar[data-nombre="${nombre}"]`);
      if (!btn) return;

      const originalText = btn.innerHTML;
      btn.innerHTML = `<span class="material-symbols-outlined text-base animate-spin">refresh</span> Descargando...`;
      btn.disabled = true;

      // Determinar extensión y MIME type
      let extension = 'pdf';
      let mimeType = 'application/pdf';
      
      if (tipo === 'docx') {
        extension = 'docx';
        mimeType = 'application/vnd.openxmlformats-officedocument.wordprocessingml.document';
      } else if (tipo === 'doc') {
        extension = 'doc';
        mimeType = 'application/msword';
      }

      fetch(url)
        .then(response => {
          if (!response.ok) throw new Error(`Error ${response.status}`);
          return response.blob();
        })
        .then(blob => {
          const blobConTipo = new Blob([blob], { type: mimeType });
          const link = document.createElement('a');
          link.href = URL.createObjectURL(blobConTipo);
          link.download = `ficha_${nombre.toLowerCase().replace(/\s+/g, '_')}.${extension}`;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(link.href);

          btn.innerHTML = originalText;
          btn.disabled = false;
        })
        .catch(error => {
          console.error('Error:', error);
          alert(`❌ No se pudo descargar la ficha de ${nombre}. Verifica la ruta: ${url}`);
          btn.innerHTML = originalText;
          btn.disabled = false;
        });
    }

    // ============================================================
    // RENDERIZADO DE TARJETAS
    // ============================================================
    function renderFichas() {
      const container = document.getElementById("fichasGrid");
      if (!container) return;
      
      container.innerHTML = "";
      
      paisesFichas.forEach(pais => {
        const card = document.createElement("div");
        card.className = "glass-card rounded-xl p-5 shadow-lg border border-indigo-100/50 flex flex-col transition-all hover:translate-y-[-4px] hover:shadow-xl";
        
        // Determinar texto del botón según tipo
        const tipoTexto = pais.tipoArchivo === 'docx' ? 'Word' : 'PDF';
        
        card.innerHTML = `
          <div class="relative h-48 mb-4 rounded-lg overflow-hidden">
            <img src="${pais.imagen}" alt="${pais.nombre}" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-indigo-900/60 to-transparent"></div>
            <div class="absolute bottom-4 left-4 flex items-center gap-2">
              <div class="bg-white/20 backdrop-blur-md p-1.5 rounded-lg border border-white/30">
                <span class="material-symbols-outlined text-white">flag</span>
              </div>
              <h3 class="text-xl font-bold text-white">${pais.nombre}</h3>
            </div>
          </div>
          <div class="flex-grow space-y-3">
            <div class="flex flex-wrap items-center gap-2">
              ${pais.tags.map(tag => `<span class="inline-block px-2 py-1 rounded-full bg-indigo-100 text-indigo-700 text-xs font-semibold">${tag}</span>`).join('')}
              <span class="inline-block px-2 py-1 rounded-full bg-green-100 text-green-700 text-xs font-semibold">${tipoTexto}</span>
            </div>
            <p class="text-gray-600 text-sm">${pais.descripcion}</p>
          </div>
          <button class="mt-4 w-full bg-indigo-600 text-white text-sm font-semibold py-3 rounded-lg flex items-center justify-center gap-2 shadow-md hover:bg-indigo-700 transition-all active:scale-95 btn-descargar" 
                  data-archivo="${pais.archivoUrl}" 
                  data-nombre="${pais.nombre}"
                  data-tipo="${pais.tipoArchivo}">
            <span class="material-symbols-outlined text-base">download</span>
            Descargar Ficha ${tipoTexto}
          </button>
        `;
        
        const btn = card.querySelector('.btn-descargar');
        btn.addEventListener('click', function() {
          descargarArchivo(this.dataset.archivo, this.dataset.nombre, this.dataset.tipo);
        });
        
        container.appendChild(card);
      });
    }

    // ============================================================
    // NAVEGACIÓN Y MENÚ (del código original)
    // ============================================================
    function setupNavigation() {
      const btnInicio = document.getElementById("btnInicio");
      if (btnInicio) {
        btnInicio.addEventListener("click", () => {
          window.location.href = "portal.html";
        });
      }
    }

    function setupMenu() {
      const btnMenu = document.getElementById("btnMenu");
      const menuPanel = document.getElementById("menuPanel");
      if (btnMenu && menuPanel) {
        btnMenu.addEventListener("click", (e) => {
          e.stopPropagation();
          menuPanel.classList.toggle("hidden");
        });
        document.addEventListener("click", (e) => {
          if (!menuPanel.contains(e.target) && !btnMenu.contains(e.target)) {
            menuPanel.classList.add("hidden");
          }
        });
      }
      
      const menuEntregados = document.getElementById("menuProyectosEntregados");
      if (menuEntregados) {
        menuEntregados.addEventListener("click", () => {
          menuPanel.classList.add("hidden");
          window.location.href = "entregados.html";
        });
      }
      
      const menuFichas = document.getElementById("menuFichasTecnicas");
      if (menuFichas) {
        menuFichas.addEventListener("click", () => {
          menuPanel.classList.add("hidden");
          window.location.reload();
        });
      }
    }

    // ============================================================
    // INICIALIZACIÓN
    // ============================================================
    document.addEventListener('DOMContentLoaded', () => {
      console.log("🚀 Catálogo de fichas técnicas (Word y PDF)");
      console.log(`📄 ${paisesFichas.length} fichas disponibles`);
      renderFichas();
      setupMenu();
      setupNavigation();
    });
  </script>
</body>
</html>
